[preferred]
# Default backend — gnome gives Nautilus as the file picker in all apps (Telegram, etc.)
default=gnome

# File/app chooser — gnome opens Nautilus file picker
org.freedesktop.impl.portal.FileChooser=gnome
org.freedesktop.impl.portal.AppChooser=gnome

# Screenshots and screencasting — wlr works with niri and other wlroots compositors
org.freedesktop.impl.portal.Screenshot=wlr
org.freedesktop.impl.portal.Screencast=wlr
